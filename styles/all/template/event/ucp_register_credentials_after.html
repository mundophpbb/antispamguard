{% if ANTISPAMGUARD_ENABLED %}
{% if ANTISPAMGUARD_REGISTER_NOTICE_ENABLED %}
<div class="antispamguard-register-notice" role="note">
    <span class="antispamguard-register-notice__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
            <path d="M12 2.25c-.19 0-.38.04-.55.13L5.7 5.17a1.5 1.5 0 0 0-.83 1.35v4.38c0 5.14 2.92 8.99 6.71 10.72.27.13.58.13.84 0 3.79-1.73 6.71-5.58 6.71-10.72V6.52c0-.57-.32-1.1-.83-1.35l-5.75-2.79a1.3 1.3 0 0 0-.55-.13Zm0 2.31 4.88 2.36v3.98c0 4.15-2.27 7.18-4.88 8.58-2.61-1.4-4.88-4.42-4.88-8.58V6.92L12 4.56Z"/>
        </svg>
    </span>
    <span class="antispamguard-register-notice__text">{{ ANTISPAMGUARD_REGISTER_NOTICE_TEXT|e }}</span>
</div>
{% endif %}
<div class="antispamguard-field" aria-hidden="true">
    <label for="antispamguard-hp">{{ lang('ANTISPAMGUARD_HP_LABEL') }}</label>
    <input type="text" id="antispamguard-hp" name="{{ ANTISPAMGUARD_HP_NAME }}" value="" tabindex="-1" autocomplete="off" />
</div>
<input type="hidden" name="antispamguard_ts" value="{{ ANTISPAMGUARD_TS }}" />
<style>
.antispamguard-register-notice {
    display: inline-flex;
    align-items: flex-start;
    gap: 10px;
    max-width: 100%;
    margin: 10px 0 12px;
    padding: 10px 14px;
    border: 1px solid #d8dee6;
    border-radius: 6px;
    background: #ffffff;
    box-sizing: border-box;
}
.antispamguard-register-notice__icon {
    flex: 0 0 auto;
    width: 20px;
    height: 20px;
    color: #2f80ed;
    margin-top: 1px;
}
.antispamguard-register-notice__icon svg {
    display: block;
    width: 100%;
    height: 100%;
    fill: currentColor;
}
.antispamguard-register-notice__text {
    display: block;
    font-size: 12px;
    line-height: 1.58;
    color: #3a4653;
    font-family: "Open Sans", Verdana, Helvetica, Arial, sans-serif;
}
.antispamguard-field {
    position: absolute !important;
    left: -9999px !important;
    width: 1px !important;
    height: 1px !important;
    overflow: hidden !important;
    opacity: 0 !important;
}
</style>
{% endif %}
