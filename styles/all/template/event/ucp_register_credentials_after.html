{% if ANTISPAMGUARD_ENABLED %}
<!-- INCLUDECSS @mundophpbb_antispamguard/antispamguard.css -->
    {% if ANTISPAMGUARD_REGISTER_NOTICE_ENABLED %}
    <div class="asg-notice-container" role="note">
        <div class="asg-notice-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <path d="m9 12 2 2 4-4"></path>
            </svg>
        </div>
        <div class="asg-notice-content">
            <span class="asg-notice-text">{{ ANTISPAMGUARD_REGISTER_NOTICE_TEXT|e }}</span>
        </div>
    </div>
    {% endif %}

    <div class="asg-hidden-field" aria-hidden="true">
        <label for="antispamguard-hp">{{ lang('ANTISPAMGUARD_HP_LABEL') }}</label>
        <input type="text" id="antispamguard-hp" name="{{ ANTISPAMGUARD_HP_NAME }}" value="" tabindex="-1" autocomplete="off" />
    </div>
    <input type="hidden" name="antispamguard_ts" value="{{ ANTISPAMGUARD_TS }}" />
{% endif %}
